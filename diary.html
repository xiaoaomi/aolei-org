<!-- 密码保护遮罩 -->
<div id="diary-lock" style="
  position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999;
  background: var(--bg, #fff);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px;
">
  <div style="font-size:40px;">🔒</div>
  <p style="font-size:18px; color:var(--text-sub,#666); margin:0;">私人档案，请输入密码</p>
  <div style="display:flex; gap:8px;">
    <input id="diary-pwd-input" type="password" placeholder="密码" maxlength="20"
      style="padding:10px 16px; font-size:16px; border:1px solid #ddd; border-radius:8px; outline:none; width:160px;"
      onkeydown="if(event.key==='Enter')checkDiaryPwd()"
    >
    <button onclick="checkDiaryPwd()" style="
      padding:10px 20px; font-size:16px; background:#4f46e5; color:#fff;
      border:none; border-radius:8px; cursor:pointer;
    ">进入</button>
  </div>
  <p id="diary-pwd-err" style="color:#e53e3e; font-size:14px; margin:0; display:none;">密码错误，再试一次</p>
</div>
<script>
(function(){
  // 检查 session 里是否已解锁
  if(sessionStorage.getItem('diary_unlocked')==='1'){
    document.getElementById('diary-lock').style.display='none';
  }
})();
function checkDiaryPwd(){
  var pwd = document.getElementById('diary-pwd-input').value;
  var h = 0;
  for(var i=0;i<pwd.length;i++){h=(h*31+pwd.charCodeAt(i))>>>0;}
  if(h===1680441699){
    sessionStorage.setItem('diary_unlocked','1');
    document.getElementById('diary-lock').style.display='none';
    document.getElementById('diary-pwd-err').style.display='none';
  } else {
    document.getElementById('diary-pwd-err').style.display='block';
    document.getElementById('diary-pwd-input').value='';
    document.getElementById('diary-pwd-input').focus();
  }
}
</script>
